<!DOCTYPE html>
<html lang="sa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahāyajña Parayana App</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #000;
  color: #fff;
  font-family: 'Noto Sans Devanagari', 'Noto Sans', Arial, sans-serif;
}
#display {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  padding: 40px 60px;
}
#pace-indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40vw;
  opacity: 0.3;
  display: none;
  pointer-events: none;
  z-index: 1;
}
#countdown-overlay {
  position: absolute;
  inset: 0;
  background: #000;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
}
#countdown-overlay .countdown-label {
  font-size: 3vw;
  color: #FFD700;
  margin-bottom: 40px;
}
#countdown-overlay .countdown-number {
  font-size: 12vw;
  color: #fff;
  font-weight: bold;
}
.verse-line {
  font-size: 2.2vw;
  letter-spacing: 0.15em;
  margin: 1.5em 0;
  position: relative;
  white-space: nowrap;
  line-height: 1.4;
}
.syllable {
  display: inline-block;
  position: relative;
  transition: color 0.1s;
}
.syllable.active {
  color: #FFD700;
}
.syllable.done {
  color: #888;
}
.verse-marker {
  display: inline-block;
  margin-left: 0.3em;
  color: #666;
}
#pointer {
  display: none !important;
}
</style>
</head>
<body>
<div id="display"></div>
<script>
// Projector view: receives DOM updates from operator via BroadcastChannel.
// This is a same-origin trusted channel (operator opens this window),
// so the content is from our own application, not external/untrusted input.
var channel = new BroadcastChannel('gita-projector');
var display = document.getElementById('display');

channel.onmessage = function(e) {
  if (e.data && e.data.type === 'sync') {
    // Content originates from same-origin operator window (index.html).
    display.innerHTML = e.data.html;  // eslint-disable-line no-unsanitized/property
  }
};
</script>
</body>
</html>
